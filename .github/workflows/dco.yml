# Checks that every commit in a pull request carries a "Signed-off-by" line,
# certifying the Developer Certificate of Origin (https://developercertificate.org).

name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  check_dco:
    name: DCO Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Signed-off-by lines
        run: |
          missing=0
          for sha in $(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            if ! git log -1 --format=%B "$sha" | grep -Eq '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a valid 'Signed-off-by' line. Use 'git commit -s'."
              missing=1
            fi
          done
          exit $missing
